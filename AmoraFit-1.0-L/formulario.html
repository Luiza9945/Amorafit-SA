<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calcule seu Gasto Energético Diário - AmoraFit</title>
  <link rel="stylesheet" href="css/formulario.css">
</head>

<body>

  <div class="banner-amorafit">
    <img src="Amora Fit.png" alt="Amora feliz voando" class="amora-voando">
  </div>

  <main class="container">
    
    <div class="bg-bubbles">
      <div class="bubble b1"></div>
      <div class="bubble b2"></div>
      <div class="bubble b3"></div>
      <div class="bubble b4"></div>
    </div>
    <div class="card">
      <form id="formularioTDEE">
        <label for="idade">Idade</label>
        <input type="number" id="idade" name="idade" placeholder="Digite sua idade" required>

        <label for="sexo">Sexo</label>
        <select id="sexo" name="sexo" required>
          <option value="">Selecione seu sexo</option>
          <option value="masculino">Masculino</option>
          <option value="feminino">Feminino</option>
        </select>

        <label for="peso">Peso (kg)</label>
        <input type="number" id="peso" name="peso" placeholder="Digite seu peso" step="0.1" required>

        <label for="altura">Altura (cm)</label>
        <input type="number" id="altura" name="altura" placeholder="Digite sua altura" step="0.1" required>

        <label for="nivelAtividade">Nível de Atividade Física</label>
        <select id="nivelAtividade" name="nivelAtividade" required>
          <option value="">Selecione seu nível de atividade</option>
          <option value="1.2">Sedentário (pouco ou nenhum exercício)</option>
          <option value="1.375">Levemente ativo (exercício leve 1-3 dias/semana)</option>
          <option value="1.55">Moderadamente ativo (exercício moderado 3-5 dias/semana)</option>
          <option value="1.725">Muito ativo (exercício intenso 6-7 dias/semana)</option>
          <option value="1.9">Extremamente ativo (exercício muito intenso, trabalho físico)</option>
        </select>

        <label for="objetivo">Objetivo</label>
        <select id="objetivo" name="objetivo" required>
          <option value="">Selecione seu objetivo</option>
          <option value="emagrecer">Emagrecer</option>
          <option value="manter">Manter peso</option>
          <option value="engordar">Ganhar peso</option>
        </select>

        <!-- Modal -->
        <div id="meuModal" class="modal">
          <div class="modal-conteudo">
            <span class="fechar" onclick="fecharModal()">&times;</span>

            <h2>Seu Gasto Energético Diário:</h2>
            <p class="gasto-total"><span id="gastoCalorias">0</span> kcal/dia</p>
            <p class="gasto-info" id="gastoInfo"></p>
            <button onclick="irParaPagina()" class="btn-ok">OK</button>

          </div>
        </div>

        <button onclick="abrirModal()" class="btn-calcular">Calcular</button>


      </form>
    </div>

    <div class="texto">
      <h1>Calcule seu Gasto Energético Diário</h1>
      <p>Descubra quantas calorias você gasta por dia. Assim você consegue planejar melhor sua alimentação e alcançar seus objetivos!</p>
    </div>
  </main>

  <script>
    function abrirModal() {
      document.getElementById("meuModal").style.display = "block";
    }

    function irParaPagina() {
      window.location.href = "calculadora.html";

    }



  </script>

  <script src="js/formulario.js"></script>




</body>

</html>
