<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro </title>
  <link rel="stylesheet" href="css/cadastro.css">
</head>
<body>

  <div class="banner-amorafit">

    <img src="Amora Fit.png" alt="Amora feliz voando" class="amora-voando">

    <h1>Cadastre-se</h1>
    <p>Vamos criar sua conta?</p>
  </div>

  <main class="container">
    
    <div class="bg-bubbles">
      <div class="bubble b1"></div>
      <div class="bubble b2"></div>
      <div class="bubble b3"></div>
      <div class="bubble b4"></div>
    </div>
    <div class="card">

      <form id="form-cadastro">
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>

        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>

        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" placeholder="Crie uma senha" required>

        <label for="confirmar">Confirmar senha</label>
        <input type="password" id="confirmar" name="confirmar" placeholder="Repita sua senha" required>

        <a href="formulario.html" id="btn-cadastrar" class="btn-cadastrar">Cadastrar</a>
        
        <p class="login-link">Já tem conta? <a href="login.html">Entrar</a></p>
      </form>
    </div>
  </main>

  <script src="js/cadastro.js"></script>
</body>
</html>
