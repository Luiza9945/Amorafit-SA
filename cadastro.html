<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Sabores</title>
  <link rel="stylesheet" href="css/cadastro.css">
</head>
<body>



  <main class="container">
    <div class="card">
      <h2>Cadastre-se</h2>

      <form action="#" method="post">
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>

        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>

        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" placeholder="Crie uma senha" required>

        <label for="confirmar">Confirmar senha</label>
        <input type="password" id="confirmar" name="confirmar" placeholder="Repita sua senha" required>

        <a href="perfil.html"><button type="submit" class="btn-cadastrar">Cadastrar</button></a>
        <p class="login-link">Já tem conta? <a href="login.html">Entrar</a></p>
      </form>
    </div>
  </main>

</body>
</html>
