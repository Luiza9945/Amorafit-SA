<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil - Sabores</title>
  <link rel="stylesheet" href="css/perfil.css">
</head>
<body>

  <main class="container">
    <div class="card-perfil">
      <img src="logo-amora.png"  alt="Foto do usuário" id="fotoPerfil" class="logo">

      <h2 id="nomeUsuario">nome do usuário</h2>

      <div class="info">
        <p><strong>Email:</strong> valeria@email.com</p>
        <p><strong>Membro desde:</strong> Novembro 2025</p>
      </div>

      <div class="botoes">
        <button id="editarBtn">Editar perfil</button>
        <button id="sairBtn" class="sair">Sair</button>
      </div>

      <input type="file" id="inputFoto" accept="image/*" hidden>
    </div>
  </main>
    <script src="js/perfil.js"></script>
</body>
</html>
